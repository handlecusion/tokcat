name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  meta:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Extract version from tag
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PKG_VER=$(node -p "require('./package.json').version")
          CARGO_VER=$(grep -E '^version = ' src-tauri/Cargo.toml | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [[ "$PKG_VER" != "$VERSION" || "$CARGO_VER" != "$VERSION" || "$TAURI_VER" != "$VERSION" ]]; then
            echo "::error::version mismatch — tag=$VERSION package.json=$PKG_VER Cargo.toml=$CARGO_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi

  build:
    name: Build DMG (${{ matrix.asset_arch }})
    needs: meta
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            rust_target: aarch64-apple-darwin
            platform_key: darwin-aarch64
            asset_arch: aarch64
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            platform_key: darwin-x86_64
            asset_arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.rust_target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: npx tauri build --target "$RUST_TARGET"

      - name: Strip .VolumeIcon.icns from DMG
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${RUST_TARGET}/release/bundle"
          DMG="$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -type f -name "Tokcat_${VERSION}_*.dmg" -print -quit)"
          if [[ -z "$DMG" || ! -f "$DMG" ]]; then
            echo "::error::DMG not found in $BUNDLE_DIR/dmg"
            find "$BUNDLE_DIR" -maxdepth 3 -type f | sort
            exit 1
          fi
          DMG_RW="${DMG%.dmg}.rw.dmg"
          DMG_MNT="$(mktemp -d)"
          hdiutil convert "$DMG" -format UDRW -o "$DMG_RW" -ov >/dev/null
          hdiutil attach -nobrowse -mountpoint "$DMG_MNT" "$DMG_RW" >/dev/null
          rm -f "$DMG_MNT/.VolumeIcon.icns"
          SetFile -a c "$DMG_MNT" 2>/dev/null || true
          hdiutil detach "$DMG_MNT" >/dev/null
          rmdir "$DMG_MNT" 2>/dev/null || true
          hdiutil convert "$DMG_RW" -format UDZO -imagekey zlib-level=9 -o "$DMG" -ov >/dev/null
          rm -f "$DMG_RW"

      - name: Stage release artifacts
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          RUST_TARGET: ${{ matrix.rust_target }}
          PLATFORM_KEY: ${{ matrix.platform_key }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${RUST_TARGET}/release/bundle"
          DMG="$(find "$BUNDLE_DIR/dmg" -maxdepth 1 -type f -name "Tokcat_${VERSION}_*.dmg" -print -quit)"
          APP_TGZ="$BUNDLE_DIR/macos/Tokcat.app.tar.gz"
          APP_SIG="$BUNDLE_DIR/macos/Tokcat.app.tar.gz.sig"
          for f in "$DMG" "$APP_TGZ" "$APP_SIG"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::expected artifact missing: $f"
              exit 1
            fi
          done

          ARTIFACT_DIR="release-artifacts/$PLATFORM_KEY"
          mkdir -p "$ARTIFACT_DIR"
          cp "$DMG" "$ARTIFACT_DIR/Tokcat_${VERSION}_${ASSET_ARCH}.dmg"
          cp "$APP_TGZ" "$ARTIFACT_DIR/Tokcat_${VERSION}_${ASSET_ARCH}.app.tar.gz"
          cp "$APP_SIG" "$ARTIFACT_DIR/Tokcat_${VERSION}_${ASSET_ARCH}.app.tar.gz.sig"
          shasum -a 256 "$ARTIFACT_DIR/Tokcat_${VERSION}_${ASSET_ARCH}.dmg" > "$ARTIFACT_DIR/${PLATFORM_KEY}.dmg.sha256"
          find "$ARTIFACT_DIR" -maxdepth 1 -type f -print | sort

      - uses: actions/upload-artifact@v4
        with:
          name: tokcat-macos-${{ matrix.asset_arch }}
          path: release-artifacts/${{ matrix.platform_key }}/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      sha256_arm: ${{ steps.manifest.outputs.sha256_arm }}
      sha256_intel: ${{ steps.manifest.outputs.sha256_intel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: tokcat-macos-*
          path: release-artifacts
          merge-multiple: true

      - name: Extract release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          NOTES_FILE="release-artifacts/release-notes.md"
          TAG_OBJECT="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          TAG_TYPE="$(jq -r '.object.type' <<< "$TAG_OBJECT")"
          TAG_SHA="$(jq -r '.object.sha' <<< "$TAG_OBJECT")"
          if [[ "$TAG_TYPE" == "tag" ]]; then
            gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq '.message' > "$NOTES_FILE"
          else
            printf 'Tokcat %s\n' "$VERSION" > "$NOTES_FILE"
          fi
          if [[ ! -s "$NOTES_FILE" ]]; then
            printf 'Tokcat %s\n' "$VERSION" > "$NOTES_FILE"
          fi

      - name: Generate latest.json
        id: manifest
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="release-artifacts"
          ARM_ASSET="Tokcat_${VERSION}_aarch64.app.tar.gz"
          INTEL_ASSET="Tokcat_${VERSION}_x64.app.tar.gz"
          ARM_SIG="$ARTIFACT_DIR/${ARM_ASSET}.sig"
          INTEL_SIG="$ARTIFACT_DIR/${INTEL_ASSET}.sig"
          ARM_SHA_FILE="$ARTIFACT_DIR/darwin-aarch64.dmg.sha256"
          INTEL_SHA_FILE="$ARTIFACT_DIR/darwin-x86_64.dmg.sha256"
          LATEST_JSON="$ARTIFACT_DIR/latest.json"
          NOTES_FILE="$ARTIFACT_DIR/release-notes.md"

          for f in "$ARTIFACT_DIR/Tokcat_${VERSION}_aarch64.dmg" \
                   "$ARTIFACT_DIR/Tokcat_${VERSION}_x64.dmg" \
                   "$ARTIFACT_DIR/$ARM_ASSET" \
                   "$ARTIFACT_DIR/$INTEL_ASSET" \
                   "$ARM_SIG" \
                   "$INTEL_SIG" \
                   "$ARM_SHA_FILE" \
                   "$INTEL_SHA_FILE"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::expected release artifact missing: $f"
              find "$ARTIFACT_DIR" -maxdepth 1 -type f | sort
              exit 1
            fi
          done

          SHA256_ARM="$(awk '{print $1}' "$ARM_SHA_FILE")"
          SHA256_INTEL="$(awk '{print $1}' "$INTEL_SHA_FILE")"
          {
            echo "version=$VERSION"
            echo "sha256_arm=$SHA256_ARM"
            echo "sha256_intel=$SHA256_INTEL"
          } >> "$GITHUB_OUTPUT"

          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DOWNLOAD_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          NOTES="$(cat "$NOTES_FILE")"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg arm_signature "$(cat "$ARM_SIG")" \
            --arg arm_url "$DOWNLOAD_BASE/$ARM_ASSET" \
            --arg intel_signature "$(cat "$INTEL_SIG")" \
            --arg intel_url "$DOWNLOAD_BASE/$INTEL_ASSET" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {signature: $arm_signature, url: $arm_url},
                "darwin-x86_64": {signature: $intel_signature, url: $intel_url}
              }
            }' > "$LATEST_JSON"
          cat "$LATEST_JSON"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ARTIFACT_DIR="release-artifacts"
          NOTES_FILE="$ARTIFACT_DIR/release-notes.md"
          gh release create "$TAG" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_aarch64.dmg" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_x64.dmg" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_aarch64.app.tar.gz" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_aarch64.app.tar.gz.sig" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_x64.app.tar.gz" \
            "$ARTIFACT_DIR/Tokcat_${VERSION}_x64.app.tar.gz.sig" \
            "$ARTIFACT_DIR/latest.json" \
            --title "Tokcat $VERSION" \
            --notes-file "$NOTES_FILE"

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tokcat
        uses: actions/checkout@v4
        with:
          repository: handlecusion/homebrew-tokcat
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump cask version + arch sha256
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA256_ARM: ${{ needs.release.outputs.sha256_arm }}
          SHA256_INTEL: ${{ needs.release.outputs.sha256_intel }}
        run: |
          set -euo pipefail
          CASK="tap/Casks/tokcat.rb"
          if [[ ! -f "$CASK" ]]; then
            echo "::error::cask not found at $CASK"
            exit 1
          fi

          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          cask = Path("tap/Casks/tokcat.rb")
          text = cask.read_text()
          version = os.environ["VERSION"]
          sha_arm = os.environ["SHA256_ARM"]
          sha_intel = os.environ["SHA256_INTEL"]

          arch_line = '  arch arm: "aarch64", intel: "x64"'
          if re.search(r'^  arch arm: ', text, flags=re.M):
              text = re.sub(r'^  arch arm: .*$', arch_line, text, flags=re.M)
          else:
              text = text.replace('cask "tokcat" do\n', f'cask "tokcat" do\n{arch_line}\n', 1)

          text = re.sub(r'^  version "[^"]*"$', f'  version "{version}"', text, flags=re.M)
          arch_sha = f'  sha256 arm:   "{sha_arm}",\n         intel: "{sha_intel}"'
          text = re.sub(
              r'^  sha256 arm:\s*"[^"]*",\n\s*intel:\s*"[^"]*"$',
              arch_sha,
              text,
              flags=re.M,
          )
          text = re.sub(r'^  sha256 "[^"]*"$', arch_sha, text, flags=re.M)
          text = re.sub(
              r'^  url "https://github\.com/handlecusion/tokcat/releases/download/v#\{version\}/Tokcat_#\{version\}_[^"]*\.dmg"$',
              '  url "https://github.com/handlecusion/tokcat/releases/download/v#{version}/Tokcat_#{version}_#{arch}.dmg"',
              text,
              flags=re.M,
          )
          text = re.sub(r'^  desc "[^"]*"$', '  desc "Menubar dashboard for local AI token usage"', text, flags=re.M)
          text = re.sub(r'^  depends_on formula: "tokscale"$\n', '', text, flags=re.M)
          cask.write_text(text)
          PY

          echo "--- updated cask ---"
          cat "$CASK"
          if ! grep -q 'arch arm: "aarch64", intel: "x64"' "$CASK"; then
            echo "::error::arch stanza not updated in cask"
            exit 1
          fi
          if ! grep -q "version \"${VERSION}\"" "$CASK"; then
            echo "::error::version not updated in cask"
            exit 1
          fi
          if ! grep -q "sha256 arm:   \"${SHA256_ARM}\"" "$CASK"; then
            echo "::error::arm sha256 not updated in cask"
            exit 1
          fi
          if ! grep -q "intel: \"${SHA256_INTEL}\"" "$CASK"; then
            echo "::error::intel sha256 not updated in cask"
            exit 1
          fi
          if ! grep -q 'Tokcat_#{version}_#{arch}.dmg' "$CASK"; then
            echo "::error::arch-aware url not updated in cask"
            exit 1
          fi
          if grep -q 'depends_on formula: "tokscale"' "$CASK"; then
            echo "::error::tokscale dependency still present in cask"
            exit 1
          fi

      - name: Commit & push
        working-directory: tap
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "tokcat-release-bot"
          git config user.email "tokcat-release-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git add Casks/tokcat.rb
          git commit -m "Bump tokcat cask to ${VERSION}"
          git push origin HEAD:main
